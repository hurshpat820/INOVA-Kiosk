<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INOVA — Kiosk Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0a0a0a;
            --accent: #00ff41;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #1a1a1a;
            --danger: #ff4444;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --glow: 0 0 20px rgba(0, 255, 65, 0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            height: 100px;
            min-height: 100px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 50px;
            background: var(--bg);
            z-index: 10;
            position: relative;
        }

        .top-bar::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50px;
            right: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        .brand {
            flex: 1;
        }

        .brand-name {
            color: var(--accent);
            font-weight: 800;
            font-size: 28px;
            letter-spacing: 4px;
            line-height: 1;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .brand-sub {
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
            font-weight: 600;
        }

        .hotel-name {
            flex: 2;
            text-align: center;
            font-size: 18px;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .clock {
            flex: 1;
            text-align: right;
            font-family: var(--font-mono);
            font-size: 20px;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        /* Middle Zone */
        .directory-container {
            flex: 1;
            overflow-y: auto;
            padding: 60px 50px;
            -webkit-overflow-scrolling: touch;
        }

        .employee-list {
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid var(--border);
        }

        .employee-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 72px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s ease;
            background: transparent;
            position: relative;
        }

        .employee-row:last-child { border-bottom: none; }
        .employee-row:nth-child(even) { background: rgba(255,255,255,0.01); }
        .employee-row:hover { background: rgba(0,255,65,0.04); }
        .employee-row:active { background: rgba(0,255,65,0.08); }

        .employee-row.on-duty {
            border-left: 3px solid var(--accent);
            padding-left: 37px;
        }

        .employee-row.on-duty .emp-name { color: var(--accent); }

        .emp-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .emp-dept {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Bottom Bar */
        .bottom-bar {
            height: 80px;
            min-height: 80px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            background: var(--bg);
            z-index: 10;
        }

        .btn-muted {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 4px;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-muted:hover {
            color: var(--text-main);
            border-color: #444;
            background: rgba(255,255,255,0.05);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--bg);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 500px;
            padding: 50px;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--text-main);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
            color: var(--text-main);
        }

        /* PIN Pad */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            height: 50px;
            align-items: center;
        }

        .pin-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pin-dot.filled {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: scale(1.2);
        }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 360px;
            margin: 0 auto;
        }

        .pin-btn {
            height: 85px;
            width: 85px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            margin: 0 auto;
        }

        .pin-btn:active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            transform: scale(0.9);
        }

        .pin-btn.action {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 800;
            border-radius: 50%;
            letter-spacing: 1px;
        }

        .pin-btn.submit {
            background: rgba(0, 255, 65, 0.05);
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        input, select {
            background: #000;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px;
            font-size: 15px;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        .btn-primary:active {
            opacity: 0.8;
        }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
            display: none;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 100px;
            bottom: 80px;
            left: 0;
            right: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            gap: 20px;
        }

        .loader-brand {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 8px;
            animation: pulse 1.5s infinite;
        }


        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">
            <div class="brand-name">INOVA</div>
            <div class="brand-sub">Workforce Management</div>
        </div>
        <div class="hotel-name">Baymont Inn & Suites — Springfield</div>
        <div class="clock" id="clock">00:00:00 AM</div>
    </div>

    <div class="directory-container">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loader-brand">INOVA</div>
            <div style="font-size: 10px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase;">Initializing Kiosk...</div>
        </div>
        <div class="employee-list" id="employeeList">
            <!-- Rows populated by JS -->
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-muted" onclick="openModal('registerModal')">Register Employee</button>
        <button class="btn-muted" onclick="openModal('managerModal')">Manager Access</button>
    </div>

    <!-- PIN Modal -->
    <div class="modal-overlay" id="pinModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal('pinModal')">&times;</div>
            <div class="modal-title" id="pinModalTitle">Employee Name</div>
            <div class="pin-display" id="pinDisplay">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            <div class="pin-grid">
                <button class="pin-btn" onclick="appendPin('1')">1</button>
                <button class="pin-btn" onclick="appendPin('2')">2</button>
                <button class="pin-btn" onclick="appendPin('3')">3</button>
                <button class="pin-btn" onclick="appendPin('4')">4</button>
                <button class="pin-btn" onclick="appendPin('5')">5</button>
                <button class="pin-btn" onclick="appendPin('6')">6</button>
                <button class="pin-btn" onclick="appendPin('7')">7</button>
                <button class="pin-btn" onclick="appendPin('8')">8</button>
                <button class="pin-btn" onclick="appendPin('9')">9</button>
                <button class="pin-btn action" onclick="clearPin()">Clear</button>
                <button class="pin-btn" onclick="appendPin('0')">0</button>
                <button class="pin-btn action submit" onclick="submitPin()">Submit</button>
            </div>
            <div class="error-msg" id="pinError">Incorrect PIN</div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-content" style="max-width: 560px; max-height: 88vh; overflow-y: auto;">
            <div class="modal-close" onclick="closeModal('registerModal')">&times;</div>
            <div class="modal-title">Register New Employee</div>
            <form id="registerForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="regFirst" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="regLast" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="regDob" required>
                    </div>
                    <div class="form-group">
                        <label>SSN (Full 9 digits)</label>
                        <input type="password" id="regSsn" maxlength="9" placeholder="9 digits" required>
                    </div>
                    <div class="form-group full">
                        <label>Address</label>
                        <input type="text" id="regAddress" placeholder="123 Main St, City, State" required>
                    </div>
                    <div class="form-group full">
                        <label>Phone Number</label>
                        <input type="tel" id="regPhone" placeholder="(555) 555-5555" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
        </div>
    </div>

    <!-- Manager Modal -->
    <div class="modal-overlay" id="managerModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal('managerModal')">&times;</div>
            <div class="modal-title">Manager Access</div>
            <form id="managerForm">
                <div class="form-group full">
                    <label>Email Address</label>
                    <input type="email" id="mgrEmail" required>
                </div>
                <div class="form-group full">
                    <label>Password</label>
                    <input type="password" id="mgrPass" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
                <div class="error-msg" id="mgrError">Access Denied</div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc, addDoc, updateDoc, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5nYX4Wpj0OfbOJo2i3r_lD2Z11rq1RT0",
            authDomain: "hotel-payroll-markii-e21fd.firebaseapp.com",
            projectId: "hotel-payroll-markii-e21fd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const hotelId = "baymont_springfield";

        let currentPin = "";
        let selectedEmployee = null;

        // Clock
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('clock').textContent = `${h}:${m}:${s} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Pay Period Utility — anchor: March 29, 2026
        function payPeriodId(date) {
            const anchor = new Date(2026, 2, 29); // March 29, 2026
            const diff = Math.floor((date - anchor) / (1000 * 60 * 60 * 24));
            const p = Math.floor(diff / 14);
            const periodStart = new Date(anchor);
            periodStart.setDate(periodStart.getDate() + p * 14);
            return `${periodStart.getFullYear()}_PP_${String(p).padStart(2, "0")}`;
        }

        // Data Loading
        async function loadEmployees() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            
            try {
                const q = query(
                    collection(db, "hotels", hotelId, "employees"),
                    where("status", "==", "active")
                );
                
                const snap = await getDocs(q);
                const emps = [];
                snap.forEach(d => emps.push({ id: d.id, ...d.data() }));
                
                // Sort by last name
                emps.sort((a, b) => {
                    const lastA = a.name.split(' ').pop().toLowerCase();
                    const lastB = b.name.split(' ').pop().toLowerCase();
                    return lastA.localeCompare(lastB);
                });

                // Fetch logs from the last 24 hours to check who is on duty
                const yesterday = new Date();
                yesterday.setHours(yesterday.getHours() - 24);
                const recentLogsSnap = await getDocs(query(
                    collection(db, "hotels", hotelId, "logs"),
                    where("timestamp", ">=", Timestamp.fromDate(yesterday))
                ));

                const activeLogs = {};
                recentLogsSnap.forEach(d => {
                    const log = d.data();
                    if (!activeLogs[log.uid] || log.timestamp.seconds > activeLogs[log.uid].timestamp.seconds) {
                        activeLogs[log.uid] = log;
                    }
                });

                const list = document.getElementById('employeeList');
                list.innerHTML = '';
                
                emps.forEach(emp => {
                    const row = document.createElement('div');
                    const isOnDuty = activeLogs[emp.id] && activeLogs[emp.id].type === 'clockIn';
                    row.className = `employee-row ${isOnDuty ? 'on-duty' : ''}`;
                    row.innerHTML = `
                        <div class="emp-name">${emp.name}</div>
                        <div class="emp-dept">${emp.department}</div>
                    `;
                    row.onclick = () => openPinModal(emp);
                    list.appendChild(row);
                });

            } catch (err) {
                console.error("Load failed", err);
            } finally {
                overlay.style.display = 'none';
            }
        }

        // PIN Logic
        window.openPinModal = (emp) => {
            selectedEmployee = emp;
            document.getElementById('pinModalTitle').textContent = emp.name;
            currentPin = "";
            updatePinDots();
            document.getElementById('pinError').style.display = 'none';
            openModal('pinModal');
        };

        window.appendPin = (num) => {
            if (currentPin.length < 4) {
                currentPin += num;
                updatePinDots();
                document.getElementById('pinError').style.display = 'none';
            }
        };

        window.clearPin = () => {
            currentPin = "";
            updatePinDots();
        };

        function updatePinDots() {
            const dots = document.querySelectorAll('#pinDisplay .pin-dot');
            dots.forEach((dot, i) => {
                if (i < currentPin.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            });
        }

        window.submitPin = async () => {
            if (currentPin.length < 4) return;
            
            if (currentPin === selectedEmployee.ssnLast4) {
                window.location.href = `terminal.html?uid=${selectedEmployee.id}`;
            } else {
                const display = document.getElementById('pinDisplay');
                display.classList.add('shake');
                document.getElementById('pinError').style.display = 'block';
                setTimeout(() => {
                    display.classList.remove('shake');
                    clearPin();
                }, 500);
            }
        };

        // Register Logic
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = "Saving...";

            const ssn = document.getElementById('regSsn').value.trim();
            if (ssn.length !== 9) {
                alert("Please enter all 9 digits of your SSN.");
                btn.disabled = false;
                btn.textContent = "Register";
                return;
            }

            const data = {
                name: `${document.getElementById('regFirst').value.trim()} ${document.getElementById('regLast').value.trim()}`,
                dob: document.getElementById('regDob').value,
                ssnLast4: ssn.slice(-4),
                address: document.getElementById('regAddress').value.trim(),
                phone: document.getElementById('regPhone').value.trim(),
                department: "Unassigned",
                hourlyRate: 0,
                role: "employee",
                status: "active",
                createdAt: serverTimestamp()
            };

            try {
                const docRef = await addDoc(collection(db, "hotels", hotelId, "employees"), data);
                await updateDoc(doc(db, "hotels", hotelId, "employees", docRef.id), { uid: docRef.id });
                closeModal('registerModal');
                loadEmployees();
                e.target.reset();
            } catch (err) {
                alert("Registration failed: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Register";
            }
        };

        // Manager Logic
        document.getElementById('managerForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('mgrEmail').value;
            const pass = document.getElementById('mgrPass').value;
            const err = document.getElementById('mgrError');
            err.style.display = 'none';

            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                const userDoc = await getDoc(doc(db, "hotels", hotelId, "employees", cred.user.uid));
                
                if (userDoc.exists() && userDoc.data().role === "manager") {
                    window.location.href = "manager.html";
                } else {
                    err.textContent = "Access Denied: Not a manager";
                    err.style.display = 'block';
                }
            } catch (error) {
                err.textContent = "Login Failed: " + error.message;
                err.style.display = 'block';
            }
        };

        // Modal Helpers
        window.openModal = (id) => {
            document.getElementById(id).style.display = 'flex';
        };

        window.closeModal = (id) => {
            document.getElementById(id).style.display = 'none';
        };

        // Global listeners for PIN pad
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('pinModal').style.display === 'flex') {
                if (e.key >= '0' && e.key <= '9') appendPin(e.key);
                if (e.key === 'Backspace') {
                    currentPin = currentPin.slice(0, -1);
                    updatePinDots();
                }
                if (e.key === 'Enter') submitPin();
                if (e.key === 'Escape') closeModal('pinModal');
            }
        });

        // Init
        loadEmployees();

    </script>
</body>
</html>
